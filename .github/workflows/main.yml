name: APK Downloader Fixed
permissions:
  contents: write
on:
  workflow_dispatch:
    inputs:
      apk_url:
        description: "APK URL"
        required: true
      output_folder:
        description: "Output Folder"
        required: true
        default: "output"

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      # Checkout repo
      - uses: actions/checkout@v4

      # Download APK (FIXED 🔥)
      - name: Download APK
        run: |
          URL="${{ github.event.inputs.apk_url }}"
          echo "Downloading: $URL"

          curl -L \
          -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64)" \
          "$URL" -o app.apk

      # Extract APK
      - name: Extract APK
        run: |
          mkdir -p extracted
          unzip -o app.apk -d extracted

      # Move to output folder
      - name: Move Files
        run: |
          OUT="${{ github.event.inputs.output_folder }}"
          mkdir -p "$OUT"
          cp -r extracted/* "$OUT/"

      # Commit & Push
      - name: Push Changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add .
          git commit -m "Updated APK files" || echo "No changes"
          git push
