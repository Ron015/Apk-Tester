name: APK Extract Clean (Auto Clear Old)

on:
  workflow_dispatch:
    inputs:
      apk_url:
        description: "APK URL"
        required: true
      output_folder:
        description: "Output Folder"
        required: true
        default: "output"

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout
      - uses: actions/checkout@v4

      # 2️⃣ Clean OLD output 🔥
      - name: Clean old output
        run: |
          OUT="${{ github.event.inputs.output_folder }}"
          echo "Cleaning old folder: $OUT"
          rm -rf "$OUT"

      # 3️⃣ Download APK
      - name: Download APK
        run: |
          URL="${{ github.event.inputs.apk_url }}"
          curl -L -A "Mozilla/5.0" "$URL" -o app.apk

      # 4️⃣ Extract APK
      - name: Extract APK
        run: |
          mkdir extracted
          unzip -o app.apk -d extracted

      # 5️⃣ Move only safe files (<99MB)
      - name: Move & Filter
        run: |
          OUT="${{ github.event.inputs.output_folder }}"
          mkdir -p "$OUT"

          find extracted -type f -size -99M -exec cp --parents {} "$OUT/" \;

      # 6️⃣ Cleanup temp files 💀
      - name: Cleanup
        run: |
          rm -rf extracted
          rm -f app.apk

      # 7️⃣ Commit & Push
      - name: Push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add .
          git commit -m "Updated APK (fresh clean extract)" || echo "No changes"
          git push
