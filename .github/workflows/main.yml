name: Download & Extract APK (Dynamic URL + Folder)

on:
  workflow_dispatch:
    inputs:
      apk_url:
        description: "Enter APK Download URL"
        required: true
      output_folder:
        description: "Enter Output Folder Name"
        required: true
        default: "files"

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2️⃣ Download APK
      - name: Download APK
        run: |
          echo "Downloading from: ${{ github.event.inputs.apk_url }}"
          curl -L "${{ github.event.inputs.apk_url }}" -o app.apk

      # 3️⃣ Extract APK
      - name: Extract APK
        run: |
          mkdir -p extracted
          unzip -o app.apk -d extracted

      # 4️⃣ Move files to selected folder
      - name: Copy to output folder
        run: |
          mkdir -p "${{ github.event.inputs.output_folder }}"
          cp -r extracted/* "${{ github.event.inputs.output_folder }}/"

      # 5️⃣ Commit & push
      - name: Commit & Push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add .
          git commit -m "Updated APK in ${{ github.event.inputs.output_folder }}" || echo "No changes"
          git push
